<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Luckiest+Guy&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    
    <title>Quohog+</title>
</head>
<body>
    <div class="header">
       <div>
        <img src="./assets/Quohog+-Logo.png" alt="" class="logo">

       </div>
       
       <div>
        <ul>
            <li>Trending</li>
            <li>Characters</li>
            <li>Plans</li>
            <li>About</li>
        </ul>
       </div>
       
    </div>

    <div class="hero">
        <div class="content">
            <h2>"The Griffin Household" <br>Unfiltered Chaos</h2>
            <p>Follow a family that constantly breaks logic, reality, and occasionally the laws of physics.</p>
            <div class="call-to-action">
                <button>Start watching</button>
                <button>See plans</button>
            </div>
        </div>
        <div class="banner">
            <img src="./assets/NicePng_peter-griffin-png_315689.png" alt="" class="banner">
        </div>
        
    </div>

    <div class="character-profile">
        <h2>Meet the Griffin family</h2>    

        <div class="container">
            <div class="card">
                <img src="./assets/profile/peter-griffin.png" alt="" class="peter">
            </div>
            
            <div class="card">
                <img src="./assets/profile/biran.png" alt="" class="brian">
            </div>
            
            <div class="card">
                <img src="./assets/profile/stewie.png" alt="" class="stewie">
            </div>
            
            <div class="card">
                <img src="./assets/profile/lois.png" alt="" class="lois">
            </div>
            
            <div class="card">
                <img src="./assets/profile/chris.png" alt="" class="chris">
            </div>

            <div class="card">
                <img src="./assets/profile/meg.png" alt="" class="meg">
            </div>
        </div>
        

    </div>


</body>
</html>
